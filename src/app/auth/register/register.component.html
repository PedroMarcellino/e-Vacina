<section id="register" class="login">
  <div class="container text-center">
    <div class="card-login">
      <h2>Cadastre-se já</h2>
      <p>Crie sua conta</p>

      <form class="login-form mx-auto" (ngSubmit)="register()" [formGroup]="form">

        <!-- Nome -->
        <div class="form-group text-start position-relative">
          <label for="name">Nome:</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Digite seu nome"
            formControlName="name"
            required
          />
          
        </div>

        <!-- Email -->
        <div class="form-group text-start position-relative">
          <label for="email">E-mail:</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Seu e-mail"
            formControlName="email"
        
          />
          <div class="error" *ngIf="form.get('email')?.errors?.['required'] && form.get('email')?.touched">
            O e-mail é obrigatório.
          </div>
        </div>

        <div class="form-group text-start position-relative">
          <label for="cpf">CPF:</label>
          <input
            type="text"
            id="cpf"
            class="form-control"
            placeholder="Seu CPF"
            formControlName="cpf"
            mask="000.000.000-00"
          />

          <div class="error" *ngIf="form.get('cpf')?.errors?.['required'] && form.get('cpf')?.touched">
            O CPF é obrigatório.
          </div>
        </div>

        <!-- Senha -->
        <div class="form-group text-start position-relative">
          <label for="password">Senha:</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Sua senha"
            formControlName="password"
            
          />
        </div>
        

        <!-- Confirmar Senha -->
        <div class="form-group text-start position-relative">
          <label for="password_confirmation">Confirmar senha:</label>
          <input
            type="password"
            id="password_confirmation"
            class="form-control"
            placeholder="Confirme sua senha"
            formControlName="password_confirmation"
        
          />
          
        </div>

        <!-- Botão -->
        <button type="submit" class="btn btn-primary mt-3 w-100">
          Criar Conta
        </button>

        <!-- Esqueceu senha -->
        <a href="/forgot-my-password" class="d-block mt-3 text-link">
          Esqueceu sua senha?
        </a>
      </form>

      <!-- Já tem conta -->
      <p class="mt-3">
        Já tem conta?
        <a href="/login" class="text-link">Faça login</a>
      </p>
    </div>
  </div>
</section>
